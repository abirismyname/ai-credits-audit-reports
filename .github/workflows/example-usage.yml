name: Premium Request Usage Report

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Report start date (YYYY-MM-DD)'
        required: true
      end_date:
        description: 'Report end date (YYYY-MM-DD)'
        required: false

jobs:
  download-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download premium request report
        id: report
        uses: abirismyname/ai-credits-audit-reports@main
        with:
          GITHUB_TOKEN: ${{ secrets.BILLING_TOKEN }}
          ent_name: ${{ secrets.ENTERPRISE_SLUG }}
          start_date: ${{ inputs.start_date }}
          end_date: ${{ inputs.end_date }}
          csv_path: data/ai-credits-audit-report.csv

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-credits-audit-report-${{ github.run_id }}
          path: ${{ steps.report.outputs.csv_path }}
          retention-days: 90
